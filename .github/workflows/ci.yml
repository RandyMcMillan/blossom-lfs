name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ${{ (github.event_name == 'pull_request' && github.actor != 'rsafier') && 'ubuntu-latest' || 'self-hosted' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo clean
      - run: cargo fmt --check
      - run: cargo build --all-targets
      - run: cargo test
      - run: cargo clippy -- -D warnings
